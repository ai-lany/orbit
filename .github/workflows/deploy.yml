name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # The landing app (orbit/landing) consumes the design system via
      # `file:../Design-System`, which resolves to orbit/Design-System. We
      # check the design system out there, pinned to the commit recorded by
      # the `Design-System` submodule, and build it first so the link resolves.
      - name: Checkout orbit
        uses: actions/checkout@v4
        with:
          path: orbit

      # Build the exact design-system commit the `Design-System` submodule points
      # at, read from the gitlink — so bumping the pointer flows to the deploy
      # with no second place to update.
      - name: Resolve pinned design-system commit
        id: ds
        run: echo "sha=$(git -C orbit ls-tree HEAD Design-System | awk '{print $3}')" >> "$GITHUB_OUTPUT"

      - name: Checkout design system (at the pinned submodule commit)
        uses: actions/checkout@v4
        with:
          repository: ai-lany/Design-System
          ref: ${{ steps.ds.outputs.sha }}
          path: orbit/Design-System

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            orbit/landing/package-lock.json
            orbit/Design-System/package-lock.json

      - name: Build design system (linked dependency)
        working-directory: orbit/Design-System
        run: |
          npm ci
          npm run build

      - name: Build landing
        working-directory: orbit/landing
        run: |
          npm ci
          npm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: orbit/landing/dist

      - uses: actions/deploy-pages@v4
        id: deployment
